name: MEC Paper Trading Bot

on:
  # Disparo externo desde cron.job.de (latencia ~5-10s total)
  workflow_dispatch:

  # Cron nativo de GitHub como fallback (latencia ~30-60s)
  schedule:
    - cron: "* * * * *"   # cada minuto

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    permissions:
      contents: write   # necesario para git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"          # cachea dependencias → ahorra ~20s en segunda ejecución

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Run bot
        run: python bot.py

      - name: Commit and push data
        run: |
          git config user.name  "mec-bot"
          git config user.email "mec-bot@noreply.github.com"
          git pull --rebase origin main
          git add docs/data.json state.json
          git diff --cached --quiet || git commit -m "bot: update [$(date -u '+%H:%M:%S UTC')]"
          git push
